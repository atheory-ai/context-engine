name: Release

# Derived from atheory-ai/release-template v0.2.3 (release-full pattern),
# adapted for CE's existing flow:
#   - Pure Go (CGO_ENABLED=0); tree-sitter runs as WASM on wazero
#   - Coordinated SDK + Studio compatibility checks
#   - Aggregate release bundle (ce-<version>-dist.tar.gz)
#   - npm 7-package fan-out (gated on npm-release environment)
#
# Adds: cosign keyless OIDC signing, SLSA L2 provenance, SPDX SBOM,
# Homebrew formula commit (via separate goreleaser invocation after
# signed archives are live).

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify_release:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.release_version.outputs.version }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Ensure tag points to main
        shell: bash
        run: |
          git fetch origin main --depth=1
          if ! git branch -r --contains "$GITHUB_SHA" | grep -q "origin/main"; then
            echo "Release tags must point to a commit on origin/main."
            exit 1
          fi

      - name: Read release version
        id: release_version
        shell: bash
        run: |
          file_version=$(cat VERSION)
          tag_version="${GITHUB_REF#refs/tags/v}"
          if [[ "$tag_version" != "$file_version" ]]; then
            echo "Tag version does not match VERSION file."
            echo "tag:  $tag_version"
            echo "file: $file_version"
            exit 1
          fi
          echo "version=$tag_version" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16
        with:
          go-version-file: go.mod
          cache: false

      - name: Install GoReleaser
        uses: goreleaser/goreleaser-action@e435ccd777264be153ace6237001ef4d979d3a7a
        with:
          install-only: true
          version: "~> v2"

      - name: Run verification
        run: make verify

      - name: Validate bundled default plugins
        run: make release-dry-run-plugins

      # Build the in-tree SDK plugins and stage their wasm into
      # internal/indexer/defaults so the goreleaser build embeds them. Runs after
      # the dry-run above (which stubs then removes the defaults) and before the
      # real build. Additive: it only writes the SDK-provided default plugins and
      # doesn't disturb any others placed by other means.
      - name: Set up Node.js (for building default plugins)
        uses: actions/setup-node@v6
        with:
          node-version: 22
      - name: Enable pnpm
        run: corepack enable
      - name: Build and stage in-tree default plugins
        run: make bundle-default-plugins

      - name: Build release archives (no publish yet)
        run: goreleaser release --clean --skip=publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install cosign
        uses: sigstore/cosign-installer@f713795cb21599bc4e5c4b58cbad1da852d7eeb9

      - name: Sign release archives (keyless OIDC)
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          for f in dist/ce_*.tar.gz dist/ce_*.zip; do
            echo "Signing $f"
            cosign sign-blob --yes --bundle "$f.bundle" "$f"
          done

      - name: Generate SBOM (SPDX)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610
        with:
          path: dist
          format: spdx-json
          output-file: dist/sbom.spdx.json
          upload-artifact: false
          upload-release-assets: false

      - name: Attest build provenance (SLSA L2)
        uses: actions/attest-build-provenance@92c65d2898f1f53cfdc910b962cecff86e7f8fcc
        with:
          subject-path: 'dist/ce_*.tar.gz,dist/ce_*.zip'

      - name: Sync npm package versions
        run: node scripts/set-npm-version.mjs "${{ steps.release_version.outputs.version }}"

      - name: Stage npm binaries
        run: node scripts/stage-npm-binaries.mjs

      - name: Build npm tarballs
        shell: bash
        run: |
          cd npm/darwin-arm64 && npm pack --pack-destination ../../dist
          cd ../darwin-x64 && npm pack --pack-destination ../../dist
          cd ../linux-arm64 && npm pack --pack-destination ../../dist
          cd ../linux-x64 && npm pack --pack-destination ../../dist
          cd ../win32-arm64 && npm pack --pack-destination ../../dist
          cd ../win32-x64 && npm pack --pack-destination ../../dist
          cd ../ce && npm pack --pack-destination ../../dist

      - name: Archive build output (aggregate bundle)
        shell: bash
        run: tar -czf "ce-${{ steps.release_version.outputs.version }}-dist.tar.gz" dist

      - name: Upload release bundle
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: ce-release-bundle
          path: ce-${{ steps.release_version.outputs.version }}-dist.tar.gz
          if-no-files-found: error

      - name: Upload GitHub release assets
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: ce-release-assets
          path: |
            dist/ce_${{ steps.release_version.outputs.version }}_darwin_amd64.tar.gz
            dist/ce_${{ steps.release_version.outputs.version }}_darwin_arm64.tar.gz
            dist/ce_${{ steps.release_version.outputs.version }}_linux_amd64.tar.gz
            dist/ce_${{ steps.release_version.outputs.version }}_linux_arm64.tar.gz
            dist/ce_${{ steps.release_version.outputs.version }}_windows_amd64.zip
            dist/ce_${{ steps.release_version.outputs.version }}_windows_arm64.zip
            dist/checksums.txt
            dist/*.bundle
            dist/sbom.spdx.json
          if-no-files-found: error

      - name: Upload npm tarballs
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: ce-npm-tarballs
          path: dist/*.tgz
          if-no-files-found: error

  sdk_compatibility:
    runs-on: ubuntu-latest
    steps:
      - name: Check out SDK repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          repository: atheory-ai/ce-plugin-sdk
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 22
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm build
      - run: pnpm test

  studio_compatibility:
    runs-on: ubuntu-latest
    steps:
      - name: Check out Studio repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          repository: atheory-ai/atheory-ce-studio
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 22
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm build

  publish_npm:
    runs-on: ubuntu-latest
    needs:
      - verify_release
      - sdk_compatibility
      - studio_compatibility
    environment:
      name: npm-release
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        id: download_tarballs
        with:
          name: ce-npm-tarballs
          path: dist
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - name: Publish platform packages
        env:
          VERSION: ${{ needs.verify_release.outputs.version }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        shell: bash
        run: |
          tar_dir="$(realpath "${{ steps.download_tarballs.outputs.download-path }}")"
          for tarball in \
            "$tar_dir/atheory-ai-ce-darwin-arm64-${VERSION}.tgz" \
            "$tar_dir/atheory-ai-ce-darwin-x64-${VERSION}.tgz" \
            "$tar_dir/atheory-ai-ce-linux-arm64-${VERSION}.tgz" \
            "$tar_dir/atheory-ai-ce-linux-x64-${VERSION}.tgz" \
            "$tar_dir/atheory-ai-ce-win32-arm64-${VERSION}.tgz" \
            "$tar_dir/atheory-ai-ce-win32-x64-${VERSION}.tgz"; do
            if [ ! -f "$tarball" ]; then
              echo "Missing tarball: $tarball"
              exit 1
            fi
            npm publish "$tarball" --access public --provenance
          done
      - name: Publish wrapper package
        env:
          VERSION: ${{ needs.verify_release.outputs.version }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        shell: bash
        run: |
          tar_dir="$(realpath "${{ steps.download_tarballs.outputs.download-path }}")"
          tarball="$tar_dir/atheory-ai-ce-${VERSION}.tgz"
          if [ ! -f "$tarball" ]; then
            echo "Missing tarball: $tarball"
            exit 1
          fi
          npm publish "$tarball" --access public --provenance

  publish_release:
    runs-on: ubuntu-latest
    needs:
      - verify_release
      - sdk_compatibility
      - studio_compatibility
      - publish_npm
    steps:
      - name: Download release bundle
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: ce-release-bundle
          path: release-bundle
      - name: Download GitHub release assets
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: ce-release-assets
          path: release-assets
      - name: Publish GitHub release (signed archives + SBOM + bundle)
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65
        with:
          generate_release_notes: true
          files: |
            release-bundle/ce-${{ needs.verify_release.outputs.version }}-dist.tar.gz
            release-assets/*

  publish_brew:
    runs-on: ubuntu-latest
    needs:
      - verify_release
      - publish_release
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          fetch-depth: 0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16
        with:
          go-version-file: go.mod
          cache: false
      - name: Install GoReleaser
        uses: goreleaser/goreleaser-action@e435ccd777264be153ace6237001ef4d979d3a7a
        with:
          install-only: true
          version: "~> v2"
      - name: Restore release assets for Homebrew formula
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: ce-release-assets
          path: dist
      - name: Push Homebrew formula
        # Re-runs goreleaser to commit the formula. By this point the
        # GitHub release exists with signed archives, so the formula
        # points at the right URLs.
        run: goreleaser release --clean --skip=archive,build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
