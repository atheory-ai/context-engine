name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify_release:
    runs-on: ubuntu-latest

    outputs:
      version: ${{ steps.release_version.outputs.version }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Ensure tag points to main
        shell: bash
        run: |
          git fetch origin main --depth=1
          if ! git branch -r --contains "$GITHUB_SHA" | grep -q "origin/main"; then
            echo "Release tags must point to a commit on origin/main."
            exit 1
          fi

      - name: Read release version
        id: release_version
        shell: bash
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install cross-compilers
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-x86-64-linux-gnu gcc-aarch64-linux-gnu gcc-mingw-w64-x86-64

      - name: Install GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          install-only: true
          version: "~> v2"

      - name: Check Go formatting
        shell: bash
        run: |
          files=$(git ls-files '*.go')
          if [ -z "$files" ]; then
            exit 0
          fi
          unformatted=$(gofmt -l $files)
          if [ -n "$unformatted" ]; then
            echo "These files need gofmt:"
            echo "$unformatted"
            exit 1
          fi

      - name: Run go vet
        run: go vet ./...

      - name: Run tests
        run: go test ./...

      - name: Build release artifacts
        run: goreleaser build --snapshot --clean

      - name: Archive build output
        shell: bash
        run: tar -czf "ce-${{ steps.release_version.outputs.version }}-dist.tar.gz" dist

      - name: Upload release bundle
        uses: actions/upload-artifact@v4
        with:
          name: ce-release-bundle
          path: ce-${{ steps.release_version.outputs.version }}-dist.tar.gz
          if-no-files-found: error

  publish_release:
    runs-on: ubuntu-latest
    needs: verify_release

    steps:
      - name: Download release bundle
        uses: actions/download-artifact@v4
        with:
          name: ce-release-bundle

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: ce-${{ needs.verify_release.outputs.version }}-dist.tar.gz