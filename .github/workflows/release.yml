name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify_release:
    runs-on: ubuntu-latest

    outputs:
      version: ${{ steps.release_version.outputs.version }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Ensure tag points to main
        shell: bash
        run: |
          git fetch origin main --depth=1
          if ! git branch -r --contains "$GITHUB_SHA" | grep -q "origin/main"; then
            echo "Release tags must point to a commit on origin/main."
            exit 1
          fi

      - name: Read release version
        id: release_version
        shell: bash
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install Zig
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.13.0

      - name: Install GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          install-only: true
          version: "~> v2"

      - name: Run verification
        run: make verify

      - name: Validate bundled default plugins
        run: make release-dry-run-plugins

      - name: Build release artifacts
        run: make build-cross

      - name: Archive build output
        shell: bash
        run: tar -czf "ce-${{ steps.release_version.outputs.version }}-dist.tar.gz" dist

      - name: Upload release bundle
        uses: actions/upload-artifact@v4
        with:
          name: ce-release-bundle
          path: ce-${{ steps.release_version.outputs.version }}-dist.tar.gz
          if-no-files-found: error

  sdk_compatibility:
    runs-on: ubuntu-latest

    steps:
      - name: Check out SDK repository
        uses: actions/checkout@v5
        with:
          repository: atheory-ai/ce-plugin-sdk

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Enable pnpm
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run lint
        run: pnpm lint

      - name: Build workspace
        run: pnpm build

      - name: Run tests
        run: pnpm test

  studio_compatibility:
    runs-on: ubuntu-latest

    steps:
      - name: Check out Studio repository
        uses: actions/checkout@v5
        with:
          repository: atheory-ai/atheory-ce-studio

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Enable pnpm
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run lint
        run: pnpm lint

      - name: Run typecheck
        run: pnpm typecheck

      - name: Build application
        run: pnpm build

  publish_release:
    runs-on: ubuntu-latest
    needs:
      - verify_release
      - sdk_compatibility
      - studio_compatibility

    steps:
      - name: Download release bundle
        uses: actions/download-artifact@v4
        with:
          name: ce-release-bundle

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: ce-${{ needs.verify_release.outputs.version }}-dist.tar.gz
