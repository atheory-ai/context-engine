name: Release

# The GitHub Release is the canonical CE distribution. It contains the signed
# native archives consumed by install.sh. Homebrew and npm are intentionally
# separate follow-on distribution channels, so neither can block this release.

on:
  push:
    tags:
      - "v*"

permissions:
  attestations: write
  contents: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify_release:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.release_version.outputs.version }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Ensure tag points to main
        shell: bash
        run: |
          release_commit="$(git rev-parse "$GITHUB_SHA^{}")"
          if ! git merge-base --is-ancestor "$release_commit" origin/main; then
            echo "Release tags must point to a commit on origin/main."
            exit 1
          fi

      - name: Read release version
        id: release_version
        shell: bash
        run: |
          file_version=$(cat VERSION)
          tag_version="${GITHUB_REF#refs/tags/v}"
          if [[ "$tag_version" != "$file_version" ]]; then
            echo "Tag version does not match VERSION file."
            echo "tag:  $tag_version"
            echo "file: $file_version"
            exit 1
          fi
          echo "version=$tag_version" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16
        with:
          go-version-file: go.mod
          cache: false

      - name: Install GoReleaser
        uses: goreleaser/goreleaser-action@e435ccd777264be153ace6237001ef4d979d3a7a
        with:
          install-only: true
          version: "~> v2"

      - name: Check installer syntax
        run: sh -n install.sh

      - name: Run verification
        run: make verify

      - name: Validate bundled default plugins
        run: make release-dry-run-plugins

      # Build the SDK plugins that are embedded in production CE binaries.
      # The SDK workspace is in-tree, so this is the compatibility gate for the
      # released runtime rather than a checkout of an obsolete sibling repo.
      - name: Set up Node.js (for default plugins)
        uses: actions/setup-node@v6
        with:
          node-version: 22
      # Keep CI on the exact version declared by the SDK workspace. Corepack's
      # runner-default pnpm can be newer and rejects that packageManager pin.
      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          package_json_file: sdk/package.json
      - name: Build and stage in-tree default plugins
        run: make bundle-default-plugins
      - name: Verify IIR runtime and matching default plugin build
        run: make verify-iir-contract

      - name: Build release archives (no publish yet)
        run: goreleaser release --clean --skip=publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # The CLI version lives in the cli package, not main. Execute the native
      # Linux archive to ensure the GoReleaser linker target remains correct.
      - name: Verify release binary version
        run: ./scripts/validate-release-binary-version.sh "${{ steps.release_version.outputs.version }}" "dist/ce_${{ steps.release_version.outputs.version }}_linux_amd64.tar.gz"

      - name: Install cosign
        uses: sigstore/cosign-installer@f713795cb21599bc4e5c4b58cbad1da852d7eeb9

      - name: Sign release archives (keyless OIDC)
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          for f in dist/ce_*.tar.gz dist/ce_*.zip; do
            echo "Signing $f"
            cosign sign-blob --yes --bundle "$f.bundle" "$f"
          done

      - name: Generate SBOM (SPDX)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610
        with:
          path: dist
          format: spdx-json
          output-file: dist/sbom.spdx.json
          upload-artifact: false
          upload-release-assets: false

      - name: Attest build provenance (SLSA L2)
        uses: actions/attest-build-provenance@92c65d2898f1f53cfdc910b962cecff86e7f8fcc
        with:
          subject-path: 'dist/ce_*.tar.gz,dist/ce_*.zip'

      - name: Archive release assets
        shell: bash
        run: tar -czf "ce-${{ steps.release_version.outputs.version }}-dist.tar.gz" dist

      - name: Upload release bundle
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: ce-release-bundle
          path: ce-${{ steps.release_version.outputs.version }}-dist.tar.gz
          if-no-files-found: error

      - name: Upload GitHub release assets
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: ce-release-assets
          path: |
            dist/ce_${{ steps.release_version.outputs.version }}_darwin_amd64.tar.gz
            dist/ce_${{ steps.release_version.outputs.version }}_darwin_arm64.tar.gz
            dist/ce_${{ steps.release_version.outputs.version }}_linux_amd64.tar.gz
            dist/ce_${{ steps.release_version.outputs.version }}_linux_arm64.tar.gz
            dist/ce_${{ steps.release_version.outputs.version }}_windows_amd64.zip
            dist/ce_${{ steps.release_version.outputs.version }}_windows_arm64.zip
            dist/checksums.txt
            dist/*.bundle
            dist/sbom.spdx.json
          if-no-files-found: error

  publish_release:
    runs-on: ubuntu-latest
    needs: verify_release
    steps:
      - name: Download release bundle
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: ce-release-bundle
          path: release-bundle
      - name: Download GitHub release assets
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: ce-release-assets
          path: release-assets
      - name: Publish GitHub release (signed archives, SBOM, and bundle)
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65
        with:
          generate_release_notes: true
          files: |
            release-bundle/ce-${{ needs.verify_release.outputs.version }}-dist.tar.gz
            release-assets/*
