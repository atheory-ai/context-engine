name: Plugin SDK Release

# Publishes the @atheory-ai/ce-plugin-sdk packages from sdk/, on its own cadence.
# Triggered by plugin-sdk-v* tags so it never collides with the engine's v* release.
on:
  push:
    tags:
      - "plugin-sdk-v*"

permissions:
  contents: write
  id-token: write

concurrency:
  group: plugin-sdk-release-${{ github.ref }}
  cancel-in-progress: false

defaults:
  run:
    working-directory: sdk

jobs:
  verify_release:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.release_version.outputs.version }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Ensure tag points to main
        run: |
          git fetch origin main --depth=1
          if ! git branch -r --contains "$GITHUB_SHA" | grep -q "origin/main"; then
            echo "Release tags must point to a commit on origin/main."
            exit 1
          fi

      - name: Read release version
        id: release_version
        run: |
          tag_version="${GITHUB_REF#refs/tags/plugin-sdk-v}"
          node - "$tag_version" <<'NODE'
          const { readFileSync, readdirSync } = require("fs")
          const { join } = require("path")
          const tagVersion = process.argv[2]
          const mismatches = []
          for (const dir of readdirSync("packages", { withFileTypes: true })) {
            if (!dir.isDirectory()) continue
            const p = join("packages", dir.name, "package.json")
            const pkg = JSON.parse(readFileSync(p, "utf8"))
            if (pkg.private) continue
            if (pkg.version !== tagVersion) mismatches.push(`${p}: ${pkg.version}`)
          }
          if (mismatches.length) {
            console.error(`Release tag ${tagVersion} does not match package versions:`)
            for (const m of mismatches) console.error(`  ${m}`)
            process.exit(1)
          }
          NODE
          echo "version=$tag_version" >> "$GITHUB_OUTPUT"

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
      - name: Enable pnpm
        run: corepack enable
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Lint / build / test
        run: pnpm lint && pnpm build && pnpm test

      - name: Archive workspace output
        run: tar -czf "$GITHUB_WORKSPACE/ce-plugin-sdk-${{ steps.release_version.outputs.version }}.tar.gz" packages/*/dist plugins/*/dist
      - name: Upload release bundle
        uses: actions/upload-artifact@v4
        with:
          name: plugin-sdk-release-bundle
          path: ce-plugin-sdk-${{ steps.release_version.outputs.version }}.tar.gz
          if-no-files-found: error

  publish_npm:
    runs-on: ubuntu-latest
    needs: verify_release
    environment:
      name: npm-release
    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          persist-credentials: false
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - name: Enable pnpm
        run: corepack enable
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build workspace
        run: pnpm build
      - name: Publish plugin-sdk
        run: pnpm --dir packages/plugin-sdk publish --access public --provenance --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Publish plugin-sandbox
        run: pnpm --dir packages/plugin-sandbox publish --access public --provenance --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Publish create-ce-plugin
        run: pnpm --dir packages/create-ce-plugin publish --access public --provenance --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish_release:
    runs-on: ubuntu-latest
    needs: [verify_release, publish_npm]
    steps:
      - name: Download release bundle
        uses: actions/download-artifact@v4
        with:
          name: plugin-sdk-release-bundle
      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: ce-plugin-sdk-${{ needs.verify_release.outputs.version }}.tar.gz
