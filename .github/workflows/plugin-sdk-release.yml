name: Publish SDK npm package

on:
  push:
    tags:
      - "plugin-sdk-v*"
      - "plugin-sandbox-v*"
      - "create-ce-plugin-v*"

permissions:
  contents: write
  id-token: write

concurrency:
  group: plugin-sdk-release-${{ github.ref }}
  cancel-in-progress: false

defaults:
  run:
    working-directory: sdk

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm-release

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Resolve and validate package release tag
        id: release
        shell: bash
        run: |
          set -euo pipefail
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "Release tags must point to a commit on origin/main."
            exit 1
          fi
          case "$GITHUB_REF_NAME" in
            plugin-sdk-v*) package="plugin-sdk"; directory="packages/plugin-sdk"; version="${GITHUB_REF_NAME#plugin-sdk-v}" ;;
            plugin-sandbox-v*) package="plugin-sandbox"; directory="packages/plugin-sandbox"; version="${GITHUB_REF_NAME#plugin-sandbox-v}" ;;
            create-ce-plugin-v*) package="create-ce-plugin"; directory="packages/create-ce-plugin"; version="${GITHUB_REF_NAME#create-ce-plugin-v}" ;;
            *) echo "Unsupported release tag: $GITHUB_REF_NAME"; exit 1 ;;
          esac
          package_version="$(node -p "require('./' + process.argv[1] + '/package.json').version" "$directory")"
          test "$package_version" = "$version" || { echo "Tag version $version does not match $directory/package.json version $package_version."; exit 1; }
          echo "package=$package" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - name: Enable pnpm
        run: corepack enable
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Verify SDK workspace
        run: pnpm release:check
      - name: Verify npm package contents
        run: pnpm release:dry-run -- --package "${{ steps.release.outputs.package }}"
      - name: Publish with npm trusted publishing
        run: pnpm release:publish -- --package "${{ steps.release.outputs.package }}"
      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
