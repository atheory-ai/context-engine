# Derived from atheory-ai/release-template v0.2.3
# See .release-template-config for substitution values.
#
# Pure Go (CGO_ENABLED=0): tree-sitter runs as WASM on wazero, so every target
# cross-compiles with plain `go build` — no zig/clang/osxcross toolchain.

version: 2

project_name: ce

before:
  hooks:
    - go mod tidy

builds:
  - id: ce
    main: ./cmd/ce
    binary: ce
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
        -X main.version={{.Version}}

archives:
  - id: ce
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - README.md
      - LICENSE

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - Merge pull request
      - Merge branch

release:
  github:
    owner: atheory-ai
    name: context-engine
  draft: false
  prerelease: auto

brews:
  - name: ce
    repository:
      owner: atheory-ai
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: "https://atheory.ai"
    description: "Context Engine — AI-powered codebase intelligence"
    license: "Apache-2.0"
    install: |
      bin.install "ce"
    test: |
      system "#{bin}/ce", "version"
