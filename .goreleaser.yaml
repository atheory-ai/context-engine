project_name: ce

builds:
  - id: ce
    main: ./cmd/ce
    binary: ce
    env:
      - CGO_ENABLED=1
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    overrides:
      - goos: linux
        goarch: amd64
        env:
          - CC=zig cc -target x86_64-linux-gnu
      - goos: linux
        goarch: arm64
        env:
          - CC=zig cc -target aarch64-linux-gnu
      - goos: darwin
        goarch: amd64
        env:
          - CC=zig cc -target x86_64-macos
      - goos: darwin
        goarch: arm64
        env:
          - CC=zig cc -target aarch64-macos
      - goos: windows
        goarch: amd64
        env:
          - CC=zig cc -target x86_64-windows-gnu
      - goos: windows
        goarch: arm64
        env:
          - CC=zig cc -target aarch64-windows-gnu

archives:
  - format: tar.gz
    format_overrides:
      - goos: windows
        format: zip
    name_template: "ce_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

brews:
  - repository:
      owner: atheory-ai
      name: homebrew-tap
    homepage: https://atheory.ai
    description: "Context Engine — AI-powered codebase intelligence"
    install: |
      bin.install "ce"

checksum:
  name_template: "checksums.txt"

release:
  github:
    owner: atheory-ai
    name: context-engine
