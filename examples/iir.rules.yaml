# Example IIR rule pack.
#
# Rules attach durable, executable code preferences to IIR nodes — replacing
# prompt-based style guidance for semantic expectations. They are layered over
# the built-in defaults: a rule here with the same `id` as a built-in replaces
# it (letting you tune severity), and new ids are added.
#
# To have `ce iir verify` pick these up automatically, place a file named
# `iir.rules.yaml` (or .yml/.json) in your project; it is discovered from the
# working directory upward. Or pass it explicitly with `--rules`.
#
# For the MVP only FunctionIntent is a valid `target`.
rules:
  # Tune a built-in: downgrade the missing-return-type rule to a warning by
  # reusing its id.
  - id: function-explicit-return-type
    target: FunctionIntent
    severity: warning
    when:
      visibility: public
    require:
      explicitReturnType: true

  # Add a team rule: functions that declare failure modes must surface them
  # through a Result type rather than throwing.
  - id: expected-failures-use-result
    target: FunctionIntent
    severity: error
    when:
      hasFailureModes: true
    require:
      failureStrategy: ResultType

  # Structural rule: match the *shape* of a branch condition, not just top-level
  # fields. `forbidConditionShape` fails when any behavior clause's condition
  # contains a node matching the pattern — here, an equality operator compared
  # against the literal `null`. `ops` and/or `operandLiteral` may be set; at
  # least one is required. Conditions outside the normalized grammar (calls,
  # arithmetic, etc.) carry no structured form and are never matched.
  - id: forbid-null-equality
    target: FunctionIntent
    severity: warning
    require:
      forbidConditionShape:
        ops: ["==", "!=", "===", "!=="]
        operandLiteral: "null"
