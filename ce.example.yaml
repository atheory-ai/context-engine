# ce.example.yaml -- example Context Engine project configuration
# Copy values into a local ce.yaml. Do not commit real API keys.

project:
  git_url: https://github.com/your-org/your-repo.git
  base_prompt: |
    Describe this project in 1-3 sentences.
  arch_prompt: |
    Note the main packages, patterns, and constraints.

llm:
  provider: anthropic
  api_key: ""
  base_url: ""
  models:
    fast: claude-haiku-4-5-20251001
    standard: claude-sonnet-4-6
    thinking: claude-opus-4-6

engine:
  max_loops: 5
  k_limit: 20

indexer:
  include: []
  exclude:
    - "vendor/**"
    - "node_modules/**"
    - "*.pb.go"
  workers: 8

server:
  host: "127.0.0.1"
  port: 4040
  mcp_enabled: true

data:
  dir: "~/.ce"

plugins:
  - path: /path/to/my-plugin.wasm
    config:
      some_option: value
